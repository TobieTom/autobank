[phases.setup]
nixPkgs = ["nodejs_20", "npm-9_x"]

[phases.install]
cmds = [
  "npm install",
  "npm install --prefix frontend",
  "npm install --prefix agents"
]

[phases.build]
cmds = [
  "npm install --prefix frontend",
  "npm install --prefix agents",
  "cd frontend && npm run build",
  "cd agents && npx tsc --outDir dist"
]

[start]
cmd = "npm start"
